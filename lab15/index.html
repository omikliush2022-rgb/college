<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Lab 15 – DOM та події</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1 class="title">Список завдань</h1>

  <form class="task-form">
    <input type="text" name="title" placeholder="Назва завдання" required />
    <textarea name="description" placeholder="Опис завдання" required></textarea>

    <select name="priority">
      <option value="Низький">Низький</option>
      <option value="Середній">Середній</option>
      <option value="Високий">Високий</option>
    </select>

    <button type="submit">Зберегти</button>
  </form>

  <div class="tasks"></div>

  <template id="task-template">
    <div class="task-card">
      <h3 class="task-card__title"></h3>
      <p class="task-card__desc"></p>
      <span class="task-card__priority"></span>

      <div class="task-card__actions">
        <button class="edit-btn">Edit</button>
        <button class="delete-btn">Delete</button>
      </div>
    </div>
  </template>

  <script src="index.js"></script>
</body>
</html>
